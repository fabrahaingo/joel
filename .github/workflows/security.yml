name: Dependency Security

on:
  pull_request:
    branches: ["main"]
    paths:
      - "package.json"
      - "package-lock.json"
      - ".npmrc"
      - ".github/workflows/dependency-security.yml"
  push:
    branches: ["main"]
    paths:
      - "package.json"
      - "package-lock.json"
      - ".npmrc"
      - ".github/workflows/dependency-security.yml"
  schedule:
    # GitHub Actions cron uses UTC. 10:00 Paris time is 08:00 UTC in summer (CEST) and 09:00 UTC in winter (CET).
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run dependency security checks
        run: npm run security:ci

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: error
          retention-days: 30
